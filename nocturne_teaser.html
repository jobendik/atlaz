<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
<meta name="theme-color" content="#07070c"/>
<title>NOCTURNE — a visual novel teaser</title>
<style>
/* ============================================================
   NOCTURNE — interactive VN teaser
   Single self-contained file. Built around two real drawings,
   framed as moonlit portraits and brought to life with a
   cinematic camera, parallax atmosphere, generated audio and
   a tiny choice-driven story engine.
   ------------------------------------------------------------
   To tweak: see the CONFIG / CAST / MOODS / CAMERAS / STORY
   blocks in the <script> at the bottom. Everything content-
   related lives there.
   ============================================================ */

:root{
  --accent:#e9c9a0;          /* warm gold used for hairlines + titles */
  --accent2:#c9a36a;
  --ink:#f4eee6;             /* primary text */
  --ink-dim:#cdbfae;
  --tint:#4a4f86;            /* per-mood portrait tint (soft-light) */
  --tintA:0.42;              /* tint strength */
  --grade:rgba(20,24,54,0.28);/* per-mood full-screen colour grade */
  --moon:#cdd8ff;            /* moon colour */
  --moonA:0.9;
  --serif:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,"Times New Roman",serif;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#07070c;overflow:hidden;}
body{
  font-family:var(--serif);color:var(--ink);
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;
}
img{-webkit-user-drag:none;user-drag:none;pointer-events:none;}

#app{position:fixed;inset:0;overflow:hidden;background:#07070c;touch-action:none;}

/* ---------- atmosphere planes (parallax) ---------- */
.plane{position:absolute;inset:-8%;will-change:transform;}

.sky{
  background:
    radial-gradient(120% 80% at 50% 8%, rgba(60,66,120,0.55), rgba(18,18,34,0.0) 60%),
    linear-gradient(180deg,#0c0d1c 0%,#0a0a16 45%,#070710 100%);
}
.stars{position:absolute;inset:0;opacity:.7;background-repeat:no-repeat;}
.moon{
  position:absolute;left:50%;top:11%;width:34vmin;height:34vmin;transform:translate(-50%,-50%);
  border-radius:50%;opacity:var(--moonA);
  background:radial-gradient(circle at 42% 40%, var(--moon) 0%, rgba(255,255,255,0.0) 62%);
  filter:blur(2px);transition:background 2.4s ease, opacity 2.4s ease;
}
.moon::after{
  content:"";position:absolute;inset:30%;border-radius:50%;
  background:radial-gradient(circle at 45% 42%, var(--moon), rgba(255,255,255,0.0) 70%);
  opacity:.55;filter:blur(1px);
}

.fogB{
  background:
    radial-gradient(60% 40% at 22% 78%, rgba(120,120,160,0.16), transparent 70%),
    radial-gradient(60% 45% at 80% 70%, rgba(110,120,170,0.14), transparent 70%);
  mix-blend-mode:screen;
}
.fogF{
  background:
    radial-gradient(70% 30% at 50% 100%, rgba(150,160,200,0.12), transparent 75%),
    radial-gradient(40% 20% at 18% 92%, rgba(180,180,220,0.10), transparent 80%);
  mix-blend-mode:screen;pointer-events:none;
}

/* ---------- the framed portrait ---------- */
.stage{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.lens{position:absolute;inset:0;will-change:transform;}           /* JS: breathe + parallax */
.camera{position:absolute;inset:0;will-change:transform;transform-origin:50% 50%;
        transition:transform 5.5s cubic-bezier(.22,.61,.36,1);}    /* cinematic moves */
.art{position:absolute;inset:0;}
.art img{
  position:absolute;inset:0;width:100%;height:100%;object-fit:contain;
  opacity:0;transition:opacity 1.4s ease;
  filter:drop-shadow(0 24px 60px rgba(0,0,0,0.55)) contrast(1.04) saturate(1.03);
}
.art img.show{opacity:1;}
.tint{position:absolute;inset:0;background:var(--tint);opacity:var(--tintA);
      mix-blend-mode:soft-light;transition:background-color 2.2s ease, opacity 2.2s ease;
      pointer-events:none;}
.spot{position:absolute;inset:0;mix-blend-mode:screen;pointer-events:none;
      background:radial-gradient(58% 50% at 50% 42%, rgba(255,246,230,0.16), rgba(0,0,0,0) 70%);}
.fvig{position:absolute;inset:0;pointer-events:none;
      background:radial-gradient(75% 80% at 50% 50%, rgba(0,0,0,0) 52%, rgba(6,6,12,0.55) 100%);}

/* ---------- particles ---------- */
#fx{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}

/* ---------- colour grade + cinematic vignette ---------- */
.grade{position:absolute;inset:0;background:var(--grade);mix-blend-mode:soft-light;
       transition:background 2.2s ease;pointer-events:none;}
.vig{position:absolute;inset:0;pointer-events:none;
     background:
       radial-gradient(120% 100% at 50% 50%, rgba(0,0,0,0) 55%, rgba(4,4,9,0.62) 100%),
       linear-gradient(180deg, rgba(4,4,9,0.45) 0%, rgba(0,0,0,0) 22%, rgba(0,0,0,0) 64%, rgba(4,4,9,0.72) 100%);}

/* ---------- UI ---------- */
.ui{position:absolute;inset:0;pointer-events:none;}
#tap{position:absolute;inset:0;pointer-events:auto;}

/* grand name/title reveal card */
.namecard{
  position:absolute;left:0;right:0;top:34%;text-align:center;opacity:0;
  transform:translateY(14px);transition:opacity .7s ease, transform .9s cubic-bezier(.2,.7,.2,1);
  padding:0 8vw;
}
.namecard.in{opacity:1;transform:translateY(0);}
.namecard .title{
  font-size:clamp(13px,3.4vw,20px);letter-spacing:.42em;text-transform:uppercase;
  color:var(--accent);font-weight:600;padding-left:.42em;
  text-shadow:0 0 18px rgba(233,201,160,.45);
}
.namecard .rule{height:1px;width:0;margin:14px auto;background:linear-gradient(90deg,transparent,var(--accent),transparent);
  transition:width 1.1s ease .25s;}
.namecard.in .rule{width:min(58vw,360px);}
.namecard .nm{
  font-size:clamp(30px,9vw,58px);line-height:1.04;margin-top:10px;
  background:linear-gradient(180deg,#fff7ec,#e8c79a 70%,#caa063);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:0 6px 30px rgba(0,0,0,.5);
}
.namecard .sub{margin-top:12px;font-style:italic;color:var(--ink-dim);
  font-size:clamp(13px,3.6vw,18px);opacity:.92;}

/* dialogue box */
.dlg{
  position:absolute;left:0;right:0;bottom:0;pointer-events:none;
  padding:0 clamp(14px,4.5vw,40px) calc(env(safe-area-inset-bottom,0px) + clamp(16px,4vw,30px));
  opacity:0;transform:translateY(18px);transition:opacity .5s ease, transform .5s ease;
}
.dlg.in{opacity:1;transform:translateY(0);}
.plate{display:inline-flex;align-items:baseline;gap:10px;margin:0 0 -1px 8px;position:relative;z-index:2;
  padding:7px 18px;border-radius:12px 12px 0 0;
  background:linear-gradient(180deg, rgba(28,26,44,.92), rgba(20,18,34,.92));
  border:1px solid rgba(233,201,160,.30);border-bottom:none;
  box-shadow:0 -6px 24px rgba(0,0,0,.35);}
.plate .pn{font-size:clamp(16px,4.4vw,22px);color:var(--accent);letter-spacing:.04em;}
.plate .pt{font-size:clamp(9px,2.6vw,12px);letter-spacing:.28em;text-transform:uppercase;
  color:var(--ink-dim);opacity:.8;padding-left:.28em;}
.box{
  position:relative;border-radius:4px 16px 16px 16px;padding:clamp(15px,4.2vw,24px) clamp(18px,5vw,30px);
  background:linear-gradient(180deg, rgba(16,15,28,.82), rgba(12,11,22,.88));
  border:1px solid rgba(233,201,160,.26);
  box-shadow:0 18px 50px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.05);
  -webkit-backdrop-filter:blur(7px);backdrop-filter:blur(7px);
  min-height:clamp(86px,17vh,130px);
}
.box::before{content:"";position:absolute;inset:6px;border:1px solid rgba(233,201,160,.10);border-radius:2px 11px 11px 11px;pointer-events:none;}
.txt{font-size:clamp(17px,4.7vw,23px);line-height:1.5;color:var(--ink);min-height:1.5em;}
.txt em{color:#ffe6c2;font-style:italic;}
.caret{display:inline-block;width:.5em;color:var(--accent);opacity:0;margin-left:2px;transform:translateY(1px);}
.caret.on{animation:blink 1s steps(1) infinite;}
@keyframes blink{50%{opacity:1}}

/* choices */
.choices{position:absolute;left:0;right:0;bottom:0;pointer-events:none;
  padding:0 clamp(16px,6vw,40px) calc(env(safe-area-inset-bottom,0px) + clamp(22px,6vw,40px));
  display:flex;flex-direction:column;gap:clamp(12px,3vw,16px);align-items:center;}
.choice{pointer-events:auto;width:min(560px,100%);cursor:pointer;
  font-family:var(--serif);font-size:clamp(16px,4.4vw,20px);color:var(--ink);
  padding:clamp(15px,4vw,20px) clamp(18px,5vw,28px);border-radius:14px;text-align:center;
  background:linear-gradient(180deg, rgba(24,22,40,.80), rgba(16,15,30,.86));
  border:1px solid rgba(233,201,160,.32);opacity:0;transform:translateY(16px) scale(.98);
  transition:opacity .5s ease, transform .5s cubic-bezier(.2,.7,.2,1), background .25s, box-shadow .25s, border-color .25s;
  box-shadow:0 14px 36px rgba(0,0,0,.45);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);}
.choice.in{opacity:1;transform:translateY(0) scale(1);}
.choice:active{transform:scale(.97);background:linear-gradient(180deg, rgba(60,40,46,.92), rgba(38,24,32,.94));
  border-color:rgba(233,201,160,.65);box-shadow:0 0 28px rgba(233,201,160,.28),0 14px 36px rgba(0,0,0,.5);}
@media(hover:hover){.choice:hover{background:linear-gradient(180deg, rgba(46,34,52,.9), rgba(30,22,40,.92));
  border-color:rgba(233,201,160,.55);box-shadow:0 0 26px rgba(233,201,160,.22),0 14px 36px rgba(0,0,0,.5);}}

/* centred interstitial line */
.center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  text-align:center;padding:0 12vw;pointer-events:none;opacity:0;transition:opacity 1s ease;}
.center.in{opacity:1;}
.center span{font-style:italic;font-size:clamp(18px,5vw,26px);color:var(--ink-dim);
  text-shadow:0 2px 24px rgba(0,0,0,.7);line-height:1.5;}

/* paths preview */
.paths{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:clamp(14px,3vw,22px);padding:7vh 8vw;pointer-events:none;opacity:0;transition:opacity .8s ease;}
.paths.in{opacity:1;}
.paths h4{font-style:italic;color:var(--ink-dim);font-size:clamp(16px,4.4vw,20px);text-align:center;
  text-shadow:0 2px 18px rgba(0,0,0,.7);}
.pcards{display:flex;flex-direction:column;gap:clamp(11px,2.6vw,15px);width:min(520px,100%);}
.pc{position:relative;padding:clamp(14px,3.6vw,20px) clamp(16px,4vw,24px);border-radius:12px;
  background:linear-gradient(180deg, rgba(22,20,38,.72), rgba(14,13,26,.8));
  border:1px solid rgba(233,201,160,.28);opacity:0;transform:translateX(-14px);
  transition:opacity .6s ease, transform .7s cubic-bezier(.2,.7,.2,1);
  letter-spacing:.18em;text-transform:uppercase;font-size:clamp(12px,3.2vw,15px);color:var(--accent);
  box-shadow:0 10px 30px rgba(0,0,0,.4);}
.pc.in{opacity:1;transform:translateX(0);}
.pc.locked{color:var(--ink-dim);opacity:.0;border-style:dashed;letter-spacing:.32em;}
.pc.locked.in{opacity:.55;}
.pc small{display:block;letter-spacing:.04em;text-transform:none;font-style:italic;color:var(--ink-dim);
  font-size:clamp(11px,2.8vw,13px);margin-top:6px;opacity:.85;}

/* title + credits */
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:0 9vw;pointer-events:none;}
.titlewrap{opacity:0;transition:opacity 1.2s ease;}
.titlewrap.in{opacity:1;}
.kicker{font-style:italic;color:var(--ink-dim);font-size:clamp(14px,3.8vw,18px);margin-bottom:clamp(20px,5vw,34px);
  opacity:0;transition:opacity 1.4s ease;}
.kicker.in{opacity:.95;}
.gtitle{font-size:clamp(46px,16vw,118px);letter-spacing:.16em;padding-left:.16em;line-height:.96;
  background:linear-gradient(180deg,#fff8ee,#eccb9c 62%,#c79b5e);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:0 10px 50px rgba(0,0,0,.55);filter:drop-shadow(0 0 26px rgba(233,201,160,.25));}
.gtitle.shimmer{position:relative;}
.tsub{margin-top:clamp(14px,4vw,22px);letter-spacing:.46em;text-transform:uppercase;padding-left:.46em;
  font-size:clamp(10px,2.8vw,13px);color:var(--ink-dim);}
.byline{margin-top:clamp(20px,5vw,30px);font-style:italic;color:var(--ink-dim);font-size:clamp(13px,3.6vw,16px);opacity:.9;}
.begin{margin-top:clamp(34px,8vw,52px);pointer-events:auto;cursor:pointer;
  font-family:var(--serif);letter-spacing:.34em;text-transform:uppercase;padding-left:.34em;
  font-size:clamp(13px,3.4vw,16px);color:var(--ink);
  padding:clamp(14px,3.6vw,18px) clamp(30px,8vw,46px);border-radius:40px;
  background:linear-gradient(180deg, rgba(30,26,46,.7), rgba(18,16,32,.8));
  border:1px solid rgba(233,201,160,.5);opacity:0;transition:opacity 1.4s ease, transform .25s, box-shadow .35s, background .25s;
  box-shadow:0 0 0 rgba(233,201,160,0);animation:beat 3.4s ease-in-out infinite;}
.begin.in{opacity:1;}
.begin:active{transform:scale(.96);}
@media(hover:hover){.begin:hover{background:linear-gradient(180deg, rgba(48,36,54,.85), rgba(30,22,40,.9));
  box-shadow:0 0 30px rgba(233,201,160,.35);}}
@keyframes beat{0%,100%{box-shadow:0 0 0 rgba(233,201,160,0)}50%{box-shadow:0 0 26px rgba(233,201,160,.30)}}

/* credits sequence */
.credline{font-style:italic;font-size:clamp(19px,5.2vw,28px);color:var(--ink);line-height:1.45;
  min-height:1.45em;text-shadow:0 2px 24px rgba(0,0,0,.7);}
.credart{margin-top:clamp(26px,7vw,44px);opacity:0;transform:translateY(10px);
  transition:opacity 1s ease, transform 1.1s ease;}
.credart.in{opacity:1;transform:translateY(0);}
.credart .lbl{letter-spacing:.42em;text-transform:uppercase;padding-left:.42em;
  font-size:clamp(11px,2.8vw,13px);color:var(--ink-dim);}
.credart .crule{height:1px;width:min(50vw,300px);margin:14px auto;background:linear-gradient(90deg,transparent,var(--accent),transparent);}
.credart .who{font-size:clamp(28px,8vw,52px);
  background:linear-gradient(180deg,#fff7ec,#e8c79a 70%,#caa063);
  -webkit-background-clip:text;background-clip:text;color:transparent;}
.credfin{margin-top:clamp(22px,6vw,34px);letter-spacing:.3em;text-transform:uppercase;padding-left:.3em;
  font-size:clamp(11px,3vw,14px);color:var(--ink-dim);opacity:0;transition:opacity 1s ease;}
.credfin.in{opacity:.9;}
.again{margin-top:clamp(22px,6vw,30px);pointer-events:auto;cursor:pointer;opacity:0;
  font-family:var(--serif);letter-spacing:.28em;text-transform:uppercase;padding-left:.28em;
  font-size:clamp(12px,3.2vw,15px);color:var(--ink);
  padding:clamp(12px,3vw,15px) clamp(26px,7vw,38px);border-radius:30px;
  background:linear-gradient(180deg, rgba(30,26,46,.6), rgba(18,16,32,.72));
  border:1px solid rgba(233,201,160,.42);transition:opacity 1s ease, transform .25s, box-shadow .3s;}
.again.in{opacity:1;}
.again:active{transform:scale(.96);}
@media(hover:hover){.again:hover{box-shadow:0 0 24px rgba(233,201,160,.3);}}

/* top bar (mute) */
.topbar{position:absolute;top:calc(env(safe-area-inset-top,0px) + 12px);right:14px;pointer-events:none;z-index:30;}
.mute{pointer-events:auto;cursor:pointer;width:42px;height:42px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:rgba(14,13,26,.55);border:1px solid rgba(233,201,160,.3);
  color:var(--accent);font-size:18px;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);
  opacity:0;transition:opacity .6s ease, background .2s;}
.mute.in{opacity:.85;}
.mute:active{background:rgba(40,30,50,.7);}

/* tiny "tap to continue" hint */
.hint{position:absolute;right:calc(env(safe-area-inset-right,0px) + 22px);
  bottom:calc(env(safe-area-inset-bottom,0px) + 8px);
  font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-dim);
  opacity:0;transition:opacity .5s;pointer-events:none;z-index:5;}
.hint.in{opacity:.5;animation:hintpulse 2.4s ease-in-out infinite;}
@keyframes hintpulse{50%{opacity:.85}}

.hidden{display:none !important;}

/* loading veil */
#veil{position:absolute;inset:0;background:#07070c;display:flex;align-items:center;justify-content:center;z-index:60;transition:opacity 1s ease;}
#veil .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);opacity:.5;animation:beat 1.6s ease-in-out infinite;}
</style>
</head>

    </div>

    <div class="hint" id="hint">tap</div>
  </div>

  <!-- title -->
  <div class="overlay" id="title">
    <div class="kicker" id="kicker"></div>
    <div class="titlewrap" id="titlewrap">
      <div class="gtitle" id="gtitle">NOCTURNE</div>
      <div class="tsub">an interactive story</div>
      <div class="byline" id="byline"></div>
    </div>
    <div class="begin" id="begin">Begin</div>
  </div>

  <!-- credits -->
  <div class="overlay hidden" id="credits">
    <div class="credline" id="credLine"></div>
    <div class="credart" id="credArt">
      <div class="lbl">Art &amp; Story</div>
      <div class="crule"></div>
      <div class="who" id="credWho"></div>
    </div>
    <div class="credfin" id="credFin"></div>
    <div class="again" id="again">↺ Again</div>
  </div>

  <!-- chrome -->
  <div class="topbar"><div class="mute" id="mute" title="Sound">♪</div></div>

  <div id="veil"><div class="dot"></div></div>
</div>

<script>
/* ============================================================
   CONFIG — the bits you'll most likely want to change
   ============================================================ */
const ARTIST_NAME = "\u27E8 YOUR NAME \u27E9"; // <-- put her name here (shows on the final credit)
const GAME_TITLE  = "NOCTURNE";                // <-- working title (placeholder; rename freely)
const TITLE_KICKER = "Every story begins with a single drawing\u2026";

/* CAST — names, on-screen titles, which drawing, and the subtitle
   shown on the grand reveal card. Add characters here. */
const CAST = {
  lili: { name:"Liliveth", title:"THE LAST ROSE",        img:"hero", sub:"Heir to a house the night forgot" },
  vega: { name:"Vega",     title:"THE ONE WHO LOOKED UP", img:"vega", sub:"She caught a falling star and never let go" }
};

/* MOODS — palette + audio + particles for each emotional state.
   tint = portrait soft-light colour, grade = full-screen wash,
   ptype = particle style, root = audio pad base freq (Hz),
   chord = semitone offsets, wind = ambient noise level. */
const MOODS = {
  nocturne:{ tint:"#4a4f86", grade:"rgba(20,24,54,0.30)",  moon:"#cdd8ff", moonA:.92, ptype:"mote",  pc:[190,210,255], wind:.10, root:110.0, chord:[0,7,12] },
  rose:    { tint:"#7a2d3a", grade:"rgba(74,18,30,0.32)",  moon:"#ffd9c2", moonA:.85, ptype:"petal", pc:[180,40,58],   wind:.08, root:87.31, chord:[0,5,9]  },
  frost:   { tint:"#395270", grade:"rgba(20,34,56,0.34)",  moon:"#dff0ff", moonA:.9,  ptype:"glint", pc:[207,230,255], wind:.12, root:98.0,  chord:[0,7,11] },
  storm:   { tint:"#3a4258", grade:"rgba(16,20,32,0.42)",  moon:"#aebbd0", moonA:.62, ptype:"rain",  pc:[159,180,214], wind:.24, root:73.42, chord:[0,5,12] },
  dawn:    { tint:"#8a6a52", grade:"rgba(64,42,30,0.18)",  moon:"#ffe9c6", moonA:.85, ptype:"mote",  pc:[255,230,191], wind:.07, root:130.8, chord:[0,4,7]  },
  voidm:   { tint:"#222633", grade:"rgba(8,8,14,0.55)",    moon:"#000000", moonA:0,   ptype:"mote",  pc:[205,189,160], wind:.05, root:98.0,  chord:[0,7,12] }
};

/* CAMERAS — cinematic framing presets over the drawings.
   fy = vertical focus (0 = top of image, 1 = bottom),
   s = zoom, dur = seconds for the move. Nudge fy if a face
   sits a little high/low after you swap art. */
const CAMERAS = {
  hero_rose:  { img:"hero", s:2.05, fy:0.42, dur:0 },
  hero_face:  { img:"hero", s:1.95, fy:0.17, dur:5.5 },
  hero_blade: { img:"hero", s:1.65, fy:0.58, dur:5.0 },
  hero_full:  { img:"hero", s:1.00, fy:0.50, dur:6.0 },
  vega_stars: { img:"vega", s:1.70, fy:0.28, dur:0 },
  vega_face:  { img:"vega", s:1.34, fy:0.52, dur:5.0 },
  vega_full:  { img:"vega", s:1.00, fy:0.50, dur:5.5 }
};

/* STORY — the teaser, beat by beat.
   line   : someone speaks (who, cam, mood; name:true triggers the grand reveal)
   choice : two options; each sets a mood and a reply line, then rejoins
   center : a single italic interstitial line over the scene
   paths  : the "branching futures" preview
   credits: the closing emotional beat
   *italics* inside text render highlighted. Edit / add freely. */
const STORY = [
  { t:"title" },

  // ---- Night I — Liliveth ----
  { t:"line", who:"lili", cam:"hero_rose", mood:"nocturne",
    text:"You found the door. Most people walk past a dark house and decide the dark is all there is." },
  { t:"line", who:"lili", cam:"hero_face", mood:"nocturne", name:true,
    text:"I'm Liliveth. The last of a name no one says aloud anymore." },
  { t:"line", who:"lili", cam:"hero_face", mood:"nocturne",
    text:"You can set your worry down. Nothing in here bites. \u2026Except me. Occasionally." },
  { t:"line", who:"lili", cam:"hero_blade", mood:"nocturne",
    text:"So tell me \u2014 why did you stay, when everyone else turned back?" },
  { t:"choice", options:[
      { label:"\u201CThe light was still on.\u201D", mood:"rose",
        say:{ who:"lili", cam:"hero_face",
              text:"\u2026You saw it. I keep one lamp lit. Every night. In case someone is still out there. In case *she* finds her way home." } },
      { label:"\u201CSomething here felt unfinished.\u201D", mood:"frost",
        say:{ who:"lili", cam:"hero_face",
              text:"Mm. You feel it too. This whole house has been holding its breath over a single night." } }
  ]},
  { t:"line", who:"lili", cam:"hero_full", mood:"nocturne",
    text:"The night the sky came down. I still can't decide whether to remember it\u2026 or finally let it go." },

  // ---- bridge ----
  { t:"center", text:"That same night. Under the same broken sky\u2014" },

  // ---- Night II — Vega ----
  { t:"line", who:"vega", cam:"vega_stars", mood:"storm",
    text:"Shh \u2014 don't move. You'll scare it off." },
  { t:"line", who:"vega", cam:"vega_stars", mood:"storm", name:true,
    text:"There. Caught in my hair. The last falling star that still remembers the way down." },
  { t:"line", who:"vega", cam:"vega_face", mood:"storm",
    text:"Everyone stopped looking up after that night. I never could." },
  { t:"choice", options:[
      { label:"\u201CLet it fall.\u201D", mood:"dawn",
        say:{ who:"vega", cam:"vega_face",
              text:"\u2026Maybe you're right. Maybe holding on is only a slower way of falling." } },
      { label:"\u201CKeep it safe.\u201D", mood:"storm",
        say:{ who:"vega", cam:"vega_face",
              text:"That's what *she* said too. The lady with the lamp. We made the same promise, her and I." } }
  ]},
  { t:"line", who:"vega", cam:"vega_full", mood:"dawn",
    text:"One sky. Two girls who couldn't let go. \u2026That sounds like the start of a story, doesn't it?" },

  // ---- futures ----
  { t:"paths", head:"Every answer tonight opened a door\u2014",
    cards:[
      { k:"THE NIGHT THEY LET GO" },
      { k:"THE NIGHT THEY HELD ON" },
      { k:"THE NIGHT NO ONE REMEMBERS" },
      { k:"\u2014 still locked \u2014", locked:true }
    ] },

  // ---- close ----
  { t:"credits",
    lines:[
      "These aren't drawings anymore.",
      "They're characters. Choices. The first page of a world only you can open."
    ],
    fin:"Page one." }
];

/* ============================================================
   ENGINE
   ============================================================ */
const $ = id => document.getElementById(id);
const app=$("app"), cam=$("camera"), lens=$("lens"), imgs={hero:$("imgHero"),vega:$("imgVega")};
let queue=[], mode="title", curImg=null, curMood=null;
const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;

/* ---- mood ---- */
function setMood(name){
  const m=MOODS[name]; if(!m) return; curMood=name;
  const r=document.documentElement.style;
  r.setProperty("--tint", m.tint);
  r.setProperty("--grade", m.grade);
  r.setProperty("--moon", m.moon);
  r.setProperty("--moonA", m.moonA);
  Particles.setType(m.ptype, m.pc, m.wind);
  Audio.setMood(m.root, m.chord, m.wind);
}

/* ---- camera ---- */
function camTransform(c){
  const tx = -c.s*(0.5-0.5)*100;            // figures are centred horizontally
  const ty = -c.s*(c.fy-0.5)*100;
  return `translate(${tx}%, ${ty}%) scale(${c.s})`;
}
function setCamera(key,instant){
  const c=CAMERAS[key]; if(!c) return;
  if(c.img!==curImg){ // crossfade portraits
    Object.values(imgs).forEach(im=>im.classList.remove("show"));
    imgs[c.img].classList.add("show");
    curImg=c.img;
  }
  const dur = instant||reduce ? 0 : (c.dur||5.0);
  cam.style.transitionDuration = dur+"s";
  cam.style.transform = camTransform(c);
}

/* ---- typewriter ---- */
let typing=false, typeTimer=null, typeDone=null;
function renderRich(s){ // *word* -> <em>word</em>
  return s.replace(/\*([^*]+)\*/g,'<em>$1</em>')
          .replace(/\n/g,'<br>');
}
function typeLine(node, full, speed, cb){
  clearInterval(typeTimer); typing=true; typeDone=null;
  $("caret").classList.remove("on");
  let i=0;
  // we type the raw text but must keep *italic* markers paired; simplest:
  // reveal by character on a markup-stripped string, then swap to rich at end.
  const plain = full.replace(/\*/g,"");
  node.innerHTML="";
  const finish=()=>{ clearInterval(typeTimer); typing=false; node.innerHTML=renderRich(full);
                     $("caret").classList.add("on"); if(cb)cb(); };
  typeDone=finish;
  typeTimer=setInterval(()=>{
    i++; node.textContent=plain.slice(0,i);
    if(i%2===0) Audio.blip();
    if(i>=plain.length) finish();
  }, speed);
}

/* ---- name reveal card ---- */
let ncTimer=null;
function showNameCard(who){
  const c=CAST[who]; if(!c) return;
  $("ncTitle").textContent=c.title; $("ncName").textContent=c.name; $("ncSub").textContent=c.sub;
  const card=$("namecard"); card.classList.remove("in"); void card.offsetWidth; card.classList.add("in");
  Audio.chime([0,7,12],.9);
  clearTimeout(ncTimer);
  ncTimer=setTimeout(()=>card.classList.remove("in"), 3000);
}

/* ---- beat router ---- */
function next(){
  if(!queue.length) return;
  const b=queue.shift();
  switch(b.t){
    case "title":   runTitle(); break;
    case "line":    runLine(b); break;
    case "choice":  runChoice(b); break;
    case "center":  runCenter(b); break;
    case "paths":   runPaths(b); break;
    case "credits": runCredits(b); break;
  }
}

function hideAllTransient(){
  $("center").classList.remove("in");
  $("choices").classList.add("hidden");
}

function runLine(b){
  mode="line"; hideAllTransient();
  if(b.mood) setMood(b.mood);
  if(b.cam)  setCamera(b.cam);
  const c=CAST[b.who];
  $("pn").textContent=c?c.name:""; $("pt").textContent=c?c.title:"";
  $("dlg").classList.add("in");
  $("hint").classList.remove("in");
  const begin=()=>{ mode="typing";
    typeLine($("txt"), b.text, reduce?6:26, ()=>{ mode="idle"; $("hint").classList.add("in"); }); };
  if(b.name){ showNameCard(b.who); setTimeout(begin, reduce?0:650); }
  else begin();
}

function runCenter(b){
  mode="center-wait"; hideAllTransient();
  $("dlg").classList.remove("in");
  const el=$("center"), tx=$("centerTxt");
  tx.innerHTML="";
  el.classList.add("in");
  // gentle typed interstitial
  setTimeout(()=>{
    let i=0; const plain=b.text; clearInterval(typeTimer);
    typeTimer=setInterval(()=>{ i++; tx.textContent=plain.slice(0,i);
      if(i%2===0)Audio.blip();
      if(i>=plain.length){ clearInterval(typeTimer); mode="idle-center"; $("hint").classList.add("in"); } }, 42);
  }, 500);
}

function runChoice(b){
  mode="choice"; $("hint").classList.remove("in");
  const wrap=$("choices"); wrap.innerHTML=""; wrap.classList.remove("hidden");
  b.options.forEach((opt,idx)=>{
    const el=document.createElement("div"); el.className="choice"; el.textContent=opt.label;
    el.addEventListener("click",()=>{
      Audio.chime([0,5,9],.7);
      wrap.classList.add("hidden");
      // play the reply as a normal line, then continue with the rest of STORY
      const say=opt.say;
      queue.unshift({ t:"line", who:say.who, cam:say.cam, mood:opt.mood, text:say.text });
      next();
    },{passive:true});
    wrap.appendChild(el);
    setTimeout(()=>el.classList.add("in"), 120+idx*130);
  });
  // keep dialogue text from previous line visible behind, but dim caret
  $("caret").classList.remove("on");
}

function runPaths(b){
  mode="paths-wait"; hideAllTransient();
  $("dlg").classList.remove("in");
  setMood("dawn");
  setCamera(curImg==="vega"?"vega_full":"hero_full");
  const p=$("paths"); p.classList.remove("hidden");
  $("pathsH").textContent=b.head;
  const host=$("pcards"); host.innerHTML="";
  b.cards.forEach((cd,idx)=>{
    const el=document.createElement("div");
    el.className="pc"+(cd.locked?" locked":"");
    el.innerHTML = cd.k;
    host.appendChild(el);
    setTimeout(()=>{ el.classList.add("in"); if(!cd.locked)Audio.chime([0,4,7],.5); }, 260+idx*340);
  });
  requestAnimationFrame(()=>p.classList.add("in"));
  setTimeout(()=>{ mode="idle-paths"; $("hint").classList.add("in"); }, 260+b.cards.length*340+400);
}

function runCredits(b){
  mode="credits"; hideAllTransient();
  $("paths").classList.add("hidden");
  $("dlg").classList.remove("in"); $("hint").classList.remove("in");
  setMood("voidm");
  setCamera(curImg==="vega"?"vega_full":"hero_full");
  // fade portrait further out for a clean closing field
  Object.values(imgs).forEach(im=>im.style.opacity=.16);
  $("title").classList.add("hidden");
  const cr=$("credits"); cr.classList.remove("hidden");
  $("credWho").textContent=ARTIST_NAME;
  let step=0;
  const lineEl=$("credLine");
  const showLine=(txt,after)=>{
    let i=0; lineEl.innerHTML=""; clearInterval(typeTimer);
    typeTimer=setInterval(()=>{ i++; lineEl.textContent=txt.slice(0,i);
      if(i%2===0)Audio.blip();
      if(i>=txt.length){ clearInterval(typeTimer); after&&after(); } }, 40);
  };
  // sequence advances on tap
  const seq=[
    ()=>showLine(b.lines[0]),
    ()=>showLine(b.lines[1]),
    ()=>{ $("credArt").classList.add("in"); Audio.chime([0,7,12],1); },
    ()=>{ $("credFin").textContent=b.fin; $("credFin").classList.add("in");
          setTimeout(()=>$("again").classList.add("in"),700); }
  ];
  creditsSeq = seq; creditsStep=0;
  seq[0]();
  mode="credits-wait";
  $("again").onclick=()=>restart();
}
let creditsSeq=null, creditsStep=0;

/* ---- title ---- */
function runTitle(){
  mode="title";
  $("gtitle").textContent=GAME_TITLE;
  $("kicker").textContent=TITLE_KICKER;
  $("byline").textContent = "a world by "+ARTIST_NAME;
  setMood("nocturne"); // sets atmosphere behind title
  // portraits hidden until Begin
  const t=$("title"); t.classList.remove("hidden");
  setTimeout(()=>$("kicker").classList.add("in"),400);
  setTimeout(()=>$("titlewrap").classList.add("in"),1400);
  setTimeout(()=>$("begin").classList.add("in"),2600);
  $("begin").onclick=startStory;
}

function startStory(){
  Audio.start();              // first user gesture -> audio allowed
  $("mute").classList.add("in");
  const t=$("title");
  t.style.transition="opacity 1s ease"; t.style.opacity="0";
  setTimeout(()=>{ t.classList.add("hidden"); t.style.opacity=""; next(); }, 900);
}

function restart(){
  $("credits").classList.add("hidden");
  $("credArt").classList.remove("in"); $("credFin").classList.remove("in"); $("again").classList.remove("in");
  Object.values(imgs).forEach(im=>im.style.opacity="");
  curImg=null;
  queue = STORY.slice();
  // skip the title beat on replay -> jump straight back in
  queue.shift();
  $("title").classList.add("hidden");
  next();
}

/* ---- global tap to advance ---- */
function advance(){
  if(mode==="typing"){ if(typeDone)typeDone(); return; }
  if(mode==="idle"){ next(); return; }
  if(mode==="idle-center"){ $("center").classList.remove("in"); $("hint").classList.remove("in");
     setTimeout(next,600); mode="busy"; return; }
  if(mode==="idle-paths"){ $("paths").classList.remove("in"); $("hint").classList.remove("in");
     setTimeout(()=>{ $("paths").classList.add("hidden"); next(); },700); mode="busy"; return; }
  if(mode==="credits-wait"){
     if(typing) return;
     creditsStep++;
     if(creditsSeq && creditsStep<creditsSeq.length){ creditsSeq[creditsStep](); }
     return;
  }
}

/* tap handling that distinguishes tap from drag (drag = parallax) */
let pStart=null;
$("tap").addEventListener("pointerdown",e=>{ pStart={x:e.clientX,y:e.clientY,t:performance.now()}; },{passive:true});
$("tap").addEventListener("pointerup",e=>{
  if(!pStart) return;
  const dx=e.clientX-pStart.x, dy=e.clientY-pStart.y;
  const moved=Math.hypot(dx,dy);
  const dt=performance.now()-pStart.t;
  pStart=null;
  if(moved<12 && dt<600) advance();
},{passive:true});

/* ============================================================
   PARALLAX + BREATHE (rAF)
   ============================================================ */
let px=0,py=0, tpx=0,tpy=0; // pointer offsets (-1..1) target/smoothed
window.addEventListener("pointermove",e=>{
  tpx=(e.clientX/innerWidth -.5)*2;
  tpy=(e.clientY/innerHeight-.5)*2;
});
let running=true;
document.addEventListener("visibilitychange",()=>{ running=!document.hidden; if(running)loop(); });

const fogB=$("fogB"), fogF=$("fogF");
const skyEl=document.querySelector(".sky");

function loop(){
  if(!running) return;
  const now=performance.now();
  // drift so it moves even without input
  const dx = Math.sin(now*0.00013)*0.5;
  const dy = Math.cos(now*0.00017)*0.4;
  const aimX = tpx*0.6 + dx;
  const aimY = tpy*0.6 + dy;
  px += (aimX-px)*0.04; py += (aimY-py)*0.04;

  skyEl.style.transform = `translate(${px*-6}px, ${py*-4}px)`;
  fogB.style.transform  = `translate(${px*10}px, ${py*7}px)`;
  fogF.style.transform  = `translate(${px*18}px, ${py*12}px)`;

  // breathe on the portrait (separate layer from cinematic camera)
  const br = reduce?0:Math.sin(now*0.0009);
  const sw = reduce?0:Math.sin(now*0.00055);
  const bScale = 1 + (reduce?0:0.005)*((br+1)/2);
  lens.style.transform = `translate(${px*6 + sw*5}px, ${py*5 + br*6}px) scale(${bScale})`;

  Particles.step(now, px, py);
  requestAnimationFrame(loop);
}

/* ============================================================
   PARTICLES
   ============================================================ */
const Particles=(function(){
  const cv=$("fx"); const ctx=cv.getContext("2d");
  let W=0,H=0,dpr=1;
  let type="mote", col=[200,210,255], wind=.1;
  let ps=[];
  function resize(){
    dpr=Math.min(devicePixelRatio||1, 2);
    W=cv.clientWidth; H=cv.clientHeight;
    cv.width=Math.round(W*dpr); cv.height=Math.round(H*dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  function target(){ return Math.min(64, Math.round((W*H)/26000)); }
  function spawn(seed){
    const t=type;
    const p={type:t, x:Math.random()*W, y:Math.random()*H, rot:Math.random()*6.28,
             a:0, life:0, max:6+Math.random()*8};
    if(t==="mote"){ p.r=1.2+Math.random()*2.6; p.vx=(Math.random()-.5)*.2; p.vy=-.18-Math.random()*.3;
                    p.tw=Math.random()*6.28; p.aMax=.5+Math.random()*.4; }
    else if(t==="glint"){ p.r=.8+Math.random()*1.6; p.vx=(Math.random()-.5)*.12; p.vy=(Math.random()-.5)*.12;
                    p.tw=Math.random()*6.28; p.aMax=.6+Math.random()*.4; }
    else if(t==="petal"){ p.r=4+Math.random()*5; p.vx=(Math.random()-.5)*.5; p.vy=.5+Math.random()*.7;
                    p.spin=(Math.random()-.5)*.05; p.sway=Math.random()*6.28; p.aMax=.55+Math.random()*.35;
                    if(!seed){p.y=-10;} }
    else if(t==="rain"){ p.len=10+Math.random()*16; p.vx=1.2+Math.random()*.8; p.vy=10+Math.random()*8;
                    p.aMax=.18+Math.random()*.22; if(!seed){p.y=-20;p.x=Math.random()*W*1.2-W*.1;} }
    ps.push(p);
  }
  function setType(t,c,w){ type=t; col=c; wind=w; }
  function step(now, ox, oy){
    if(W===0) resize();
    ctx.clearRect(0,0,W,H);
    const off= type==="rain"?0:1; // rain ignores parallax offset for streaks
    const offX = (type==="rain"?0:ox*20);
    const offY = (type==="rain"?0:oy*14);
    // maintain population
    const tgt=target();
    let same=ps.filter(p=>p.type===type).length;
    while(same<tgt){ spawn(ps.length<tgt); same++; }
    const C=col;
    for(let k=ps.length-1;k>=0;k--){
      const p=ps[k];
      p.life+=0.016;
      // fade in/out for ambient types
      if(p.type==="mote"||p.type==="glint"){
        p.a = Math.min(p.a+0.01, p.aMax) * (p.life>p.max? Math.max(0,1-(p.life-p.max)) :1);
        const tw=(Math.sin(now*0.002+p.tw)+1)/2;
        const al=p.a*(0.5+0.5*tw);
        p.x+=p.vx + wind*0.3; p.y+=p.vy;
        if(p.type==="mote"){
          const g=ctx.createRadialGradient(p.x+offX,p.y+offY,0,p.x+offX,p.y+offY,p.r*4);
          g.addColorStop(0,`rgba(${C[0]},${C[1]},${C[2]},${al})`);
          g.addColorStop(1,`rgba(${C[0]},${C[1]},${C[2]},0)`);
          ctx.fillStyle=g; ctx.beginPath(); ctx.arc(p.x+offX,p.y+offY,p.r*4,0,6.2832); ctx.fill();
        } else { // glint = small sparkle cross
          ctx.strokeStyle=`rgba(${C[0]},${C[1]},${C[2]},${al})`; ctx.lineWidth=1;
          const r=p.r*2.2; const x=p.x+offX, y=p.y+offY;
          ctx.beginPath(); ctx.moveTo(x-r,y); ctx.lineTo(x+r,y); ctx.moveTo(x,y-r); ctx.lineTo(x,y+r); ctx.stroke();
        }
        if(p.life>p.max+1){ ps.splice(k,1); }
      }
      else if(p.type==="petal"){
        p.x+=p.vx + Math.sin(now*0.001+p.sway)*0.4 + wind*0.5; p.y+=p.vy; p.rot+=p.spin;
        p.a=Math.min(p.a+0.02,p.aMax);
        ctx.save(); ctx.translate(p.x+offX,p.y+offY); ctx.rotate(p.rot);
        ctx.fillStyle=`rgba(${C[0]},${C[1]},${C[2]},${p.a})`;
        ctx.beginPath(); ctx.ellipse(0,0,p.r,p.r*0.5,0,0,6.2832); ctx.fill();
        ctx.restore();
        if(p.y>H+20){ ps.splice(k,1); }
      }
      else if(p.type==="rain"){
        p.x+=p.vx + wind*2; p.y+=p.vy;
        ctx.strokeStyle=`rgba(${C[0]},${C[1]},${C[2]},${p.aMax})`; ctx.lineWidth=1.1;
        ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x-p.vx*1.2, p.y-p.len); ctx.stroke();
        if(p.y>H+20){ ps.splice(k,1); }
      } else { ps.splice(k,1); }
    }
    // cull foreign-type overflow gradually handled by death; hard cap:
    if(ps.length>120) ps.splice(0, ps.length-120);
  }
  addEventListener("resize",resize);
  return { setType, step, resize };
})();

/* ============================================================
   AUDIO — generated ambient pad + wind + chimes (no assets)
   ============================================================ */
const Audio=(function(){
  let ctx=null, master=null, padGain=null, oscs=[], lfo=null, lfoGain=null,
      windSrc=null, windGain=null, windFilt=null, started=false, muted=false, delay=null, fb=null;
  let baseRoot=110, baseChord=[0,7,12];
  function ensure(){
    if(ctx) return;
    const AC=window.AudioContext||window.webkitAudioContext; if(!AC) return;
    ctx=new AC();
    master=ctx.createGain(); master.gain.value=0.0; master.connect(ctx.destination);
    // soft "space" via feedback delay
    delay=ctx.createDelay(1.0); delay.delayTime.value=0.33;
    fb=ctx.createGain(); fb.gain.value=0.28;
    const dWet=ctx.createGain(); dWet.gain.value=0.5;
    delay.connect(fb); fb.connect(delay); delay.connect(dWet); dWet.connect(master);
    // pad
    padGain=ctx.createGain(); padGain.gain.value=0.0; padGain.connect(master); padGain.connect(delay);
    const filt=ctx.createBiquadFilter(); filt.type="lowpass"; filt.frequency.value=700; filt.Q.value=0.6;
    filt.connect(padGain); padFilt=filt;
    lfo=ctx.createOscillator(); lfo.frequency.value=0.05; lfoGain=ctx.createGain(); lfoGain.gain.value=240;
    lfo.connect(lfoGain); lfoGain.connect(filt.frequency); lfo.start();
    buildOscs();
    // wind/rain noise bed
    const buf=ctx.createBuffer(1, ctx.sampleRate*2, ctx.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    windSrc=ctx.createBufferSource(); windSrc.buffer=buf; windSrc.loop=true;
    windFilt=ctx.createBiquadFilter(); windFilt.type="lowpass"; windFilt.frequency.value=500;
    windGain=ctx.createGain(); windGain.gain.value=0.0;
    windSrc.connect(windFilt); windFilt.connect(windGain); windGain.connect(master);
    windSrc.start();
  }
  let padFilt=null;
  function buildOscs(){
    oscs.forEach(o=>{try{o.osc.stop()}catch(e){}});
    oscs=[];
    baseChord.forEach((semi,i)=>{
      const o=ctx.createOscillator(); o.type= i===0?"sine":"triangle";
      o.frequency.value=baseRoot*Math.pow(2,semi/12);
      o.detune.value=(i-1)*4;
      const g=ctx.createGain(); g.gain.value= i===0?0.16:0.10;
      o.connect(g); g.connect(padFilt); o.start();
      oscs.push({osc:o,gain:g,semi});
    });
  }
  function start(){
    ensure(); if(!ctx) return;
    if(ctx.state==="suspended") ctx.resume();
    started=true;
    const t=ctx.currentTime;
    master.gain.cancelScheduledValues(t);
    master.gain.setValueAtTime(master.gain.value,t);
    master.gain.linearRampToValueAtTime(muted?0:0.9, t+2.5);
    padGain.gain.linearRampToValueAtTime(0.5, t+3);
  }
  function setMood(root, chord, wind){
    baseRoot=root; baseChord=chord;
    if(!ctx||!started) return;
    const t=ctx.currentTime;
    oscs.forEach((o,i)=>{
      const semi = chord[i%chord.length];
      o.semi=semi;
      o.osc.frequency.cancelScheduledValues(t);
      o.osc.frequency.setValueAtTime(o.osc.frequency.value,t);
      o.osc.frequency.linearRampToValueAtTime(root*Math.pow(2,semi/12), t+2.2);
    });
    if(windGain){ windGain.gain.cancelScheduledValues(t);
      windGain.gain.setValueAtTime(windGain.gain.value,t);
      windGain.gain.linearRampToValueAtTime(wind*0.5, t+2.0); }
    if(windFilt){ windFilt.frequency.setTargetAtTime(wind>0.18?1400:520, t, 1.5); }
  }
  function chime(notes, vol){
    if(!ctx||!started||muted) return;
    const t=ctx.currentTime;
    notes.forEach((semi,i)=>{
      const o=ctx.createOscillator(); o.type="sine";
      o.frequency.value=baseRoot*2*Math.pow(2,semi/12);
      const g=ctx.createGain(); g.gain.value=0;
      o.connect(g); g.connect(master); g.connect(delay);
      const s=t+i*0.12;
      g.gain.setValueAtTime(0,s);
      g.gain.linearRampToValueAtTime(0.12*(vol||1), s+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, s+1.6);
      o.start(s); o.stop(s+1.8);
    });
  }
  let lastBlip=0;
  function blip(){
    if(!ctx||!started||muted) return;
    const now=performance.now(); if(now-lastBlip<28) return; lastBlip=now;
    const t=ctx.currentTime;
    const o=ctx.createOscillator(); o.type="triangle";
    o.frequency.value=baseRoot*3*(1+Math.random()*0.04);
    const g=ctx.createGain(); g.gain.value=0;
    o.connect(g); g.connect(master);
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.018,t+0.005);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.08);
    o.start(t); o.stop(t+0.1);
  }
  function toggle(){
    muted=!muted;
    if(ctx&&started){ const t=ctx.currentTime;
      master.gain.cancelScheduledValues(t);
      master.gain.setValueAtTime(master.gain.value,t);
      master.gain.linearRampToValueAtTime(muted?0:0.9,t+0.4); }
    return muted;
  }
  return { start, setMood, chime, blip, toggle, get muted(){return muted;} };
})();

$("mute").addEventListener("click",()=>{
  const m=Audio.toggle();
  $("mute").textContent = m ? "\u2715" : "\u266A";
  $("mute").style.opacity = m ? .55 : .85;
});

/* ============================================================
   BOOT
   ============================================================ */
function buildStars(){
  // a sparse field baked into the .stars element via box-shadow points
  const el=$("stars"); const n=70; let sh=[];
  for(let i=0;i<n;i++){
    const x=Math.round(Math.random()*100), y=Math.round(Math.random()*70);
    const o=(Math.random()*0.5+0.2).toFixed(2);
    sh.push(`${x}vw ${y}vh 0 0 rgba(255,255,255,${o})`);
  }
  // render as tiny dots using a single element with multiple radial bg is heavy;
  // use a child div with box-shadow
  const dot=document.createElement("div");
  dot.style.cssText="position:absolute;left:0;top:0;width:1px;height:1px;border-radius:50%;background:#fff;";
  dot.style.boxShadow=sh.join(",");
  el.appendChild(dot);
}

window.addEventListener("load", ()=>{
  buildStars();
  Particles.resize();
  queue = STORY.slice();
  setMood("nocturne");
  // reveal
  const veil=$("veil"); veil.style.opacity="0"; setTimeout(()=>veil.classList.add("hidden"),1000);
  next();          // runs the title beat
  running=true; loop();
});
</script>
